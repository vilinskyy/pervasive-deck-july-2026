<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Quantum Realm</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #030208;
    color: #c4b5fd;
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: none;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  canvas.is-dragging { cursor: grabbing; }
  .hud {
    position: fixed;
    left: 16px;
    bottom: 16px;
    z-index: 2;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(8, 6, 18, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: rgba(226, 212, 255, 0.88);
    pointer-events: none;
    max-width: min(360px, calc(100vw - 32px));
  }
  .hud strong { color: #fff; font-weight: 600; }
  .hud code {
    font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: #ddd6fe;
  }
  .err {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    padding: 24px;
    text-align: center;
    background: #030208;
    z-index: 3;
  }
  .err.is-on { display: grid; }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hud">
    <strong>Quantum Realm</strong><br>
    Drag to pan · scroll to zoom · double-click resets<br>
    <code id="stats">loading…</code>
  </div>
  <div class="err" id="err">WebGL is required to run this wallpaper.</div>

<script>
(() => {
  const canvas = document.getElementById("c");
  const stats = document.getElementById("stats");
  const err = document.getElementById("err");
  const gl = canvas.getContext("webgl", {
    alpha: false,
    antialias: false,
    premultipliedAlpha: true,
    powerPreference: "high-performance",
  });
  if (!gl) {
    err.classList.add("is-on");
    return;
  }

  const VERT = `
    attribute vec2 a_pos;
    varying vec2 v_coords;
    void main() {
      // driftwm: v_coords (0,0) is top-left of the output
      v_coords = vec2(a_pos.x * 0.5 + 0.5, -a_pos.y * 0.5 + 0.5);
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  `;

  const STAR_FRAG = `
    precision highp float;
    varying vec2 v_coords;
    uniform vec2 size;
    uniform vec2 u_camera;
    uniform float u_zoom;
    uniform float u_time;

    float hash(vec2 p) {
      p = fract(p * vec2(443.897, 441.423));
      p += dot(p, p.yx + 19.19);
      return fract((p.x + p.y) * p.x);
    }

    void main() {
      vec2 screenPx = v_coords * size / max(u_zoom, 0.05);
      vec2 canvas = screenPx + u_camera;
      vec3 col = vec3(0.010, 0.009, 0.026);

      vec2 cell = floor(canvas / 48.0);
      for (int y = 0; y <= 1; y++) {
        for (int x = 0; x <= 1; x++) {
          vec2 c = cell + vec2(float(x), float(y));
          float h = hash(c + 17.3);
          if (h > 0.82) {
            vec2 pos = (c + vec2(hash(c + 3.1), hash(c + 9.7))) * 48.0;
            float d = length(canvas - pos);
            float tw = 0.65 + 0.35 * sin(u_time * (1.2 + hash(c) * 2.5) + h * 6.2831);
            float star = exp(-d * d / (0.7 + 1.8 * hash(c + 5.5)));
            col += vec3(0.78, 0.82, 1.0) * star * tw * (0.35 + 0.65 * hash(c + 11.0));
          }
        }
      }
      gl_FragColor = vec4(col, 1.0);
    }
  `;

  function compile(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      const log = gl.getShaderInfoLog(sh) || "compile failed";
      gl.deleteShader(sh);
      throw new Error(log);
    }
    return sh;
  }

  function program(vsSrc, fsSrc) {
    const vs = compile(gl.VERTEX_SHADER, vsSrc);
    const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
    const p = gl.createProgram();
    gl.attachShader(p, vs);
    gl.attachShader(p, fs);
    gl.linkProgram(p);
    gl.deleteShader(vs);
    gl.deleteShader(fs);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(p) || "link failed");
    }
    return p;
  }

  function locs(p, names) {
    const out = { prog: p, a_pos: gl.getAttribLocation(p, "a_pos") };
    for (const n of names) out[n] = gl.getUniformLocation(p, n);
    return out;
  }

  const quad = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quad);
  gl.bufferData(
    gl.ARRAY_BUFFER,
    new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
    gl.STATIC_DRAW,
  );

  let star = null;
  let realm = null;
  let cssW = 1;
  let cssH = 1;
  let dpr = 1;
  let camera = [12000, 7000];
  let zoom = 1;
  let dragging = false;
  let lastX = 0;
  let lastY = 0;
  let start = performance.now();

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    cssW = Math.max(1, window.innerWidth);
    cssH = Math.max(1, window.innerHeight);
    const w = Math.max(1, Math.round(cssW * dpr));
    const h = Math.max(1, Math.round(cssH * dpr));
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
    }
  }

  function draw(prog, time) {
    gl.useProgram(prog.prog);
    gl.bindBuffer(gl.ARRAY_BUFFER, quad);
    gl.enableVertexAttribArray(prog.a_pos);
    gl.vertexAttribPointer(prog.a_pos, 2, gl.FLOAT, false, 0, 0);
    if (prog.size) gl.uniform2f(prog.size, cssW, cssH);
    if (prog.u_camera) gl.uniform2f(prog.u_camera, camera[0], camera[1]);
    if (prog.u_time) gl.uniform1f(prog.u_time, time);
    if (prog.u_zoom) gl.uniform1f(prog.u_zoom, zoom);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  function frame(now) {
    const t = (now - start) / 1000;
    resize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.disable(gl.BLEND);
    draw(star, t);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
    draw(realm, t);
    stats.textContent =
      `cam ${camera[0].toFixed(0)}, ${camera[1].toFixed(0)} · zoom ${zoom.toFixed(2)} · t ${t.toFixed(1)}s`;
    requestAnimationFrame(frame);
  }

  function screenToCanvas(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const sx = ((clientX - rect.left) / rect.width) * cssW;
    const sy = ((clientY - rect.top) / rect.height) * cssH;
    return [sx / zoom + camera[0], sy / zoom + camera[1]];
  }

  canvas.addEventListener("pointerdown", (e) => {
    if (e.button !== 0) return;
    dragging = true;
    canvas.classList.add("is-dragging");
    canvas.setPointerCapture(e.pointerId);
    lastX = e.clientX;
    lastY = e.clientY;
  });
  canvas.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    // Grab-drag: image follows the pointer.
    camera[0] -= dx / zoom;
    camera[1] -= dy / zoom;
  });
  function endDrag(e) {
    dragging = false;
    canvas.classList.remove("is-dragging");
    try { canvas.releasePointerCapture(e.pointerId); } catch {}
  }
  canvas.addEventListener("pointerup", endDrag);
  canvas.addEventListener("pointercancel", endDrag);

  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    const before = screenToCanvas(e.clientX, e.clientY);
    const factor = Math.exp(-e.deltaY * 0.0015);
    zoom = Math.min(8, Math.max(0.15, zoom * factor));
    const after = screenToCanvas(e.clientX, e.clientY);
    camera[0] += before[0] - after[0];
    camera[1] += before[1] - after[1];
  }, { passive: false });

  canvas.addEventListener("dblclick", () => {
    camera = [12000, 7000];
    zoom = 1;
  });

  fetch("/quantum-realm.glsl")
    .then((r) => {
      if (!r.ok) throw new Error("Failed to load quantum-realm.glsl");
      return r.text();
    })
    .then((src) => {
      // driftwm applies zoom outside the shader; for the browser we fold it
      // into screen-pixel mapping so pan/zoom explore the infinite canvas.
      const adapted = src.replace(
        "vec2 screenPx = v_coords * size;",
        "vec2 screenPx = v_coords * size / max(u_zoom, 0.05);",
      );
      star = locs(program(VERT, STAR_FRAG), ["size", "u_camera", "u_time", "u_zoom"]);
      realm = locs(program(VERT, adapted), ["size", "u_camera", "u_time", "u_zoom"]);
      requestAnimationFrame(frame);
    })
    .catch((e) => {
      err.textContent = String(e.message || e);
      err.classList.add("is-on");
    });
})();
</script>
</body>
</html>
